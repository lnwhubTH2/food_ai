version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: food-ai-api:latest
    container_name: food_ai_backend
    ports:
      - "7860:7860"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s