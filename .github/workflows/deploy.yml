name: CI/CD Pipeline - Test & Deploy to Hugging Face

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest test_main.py -v --tb=short
        env:
          TESTING: "1"
          PYTHONUNBUFFERED: "1"

  deploy:
    name: Deploy to Hugging Face Spaces
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set!"
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)

          repo_id = "joyjoysad/food_ai"
          print(f"Uploading to Space: {repo_id}")

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Auto-deploy from GitHub Actions",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".pytest_cache/*",
                  "__pycache__/*",
                  "*.pyc",
                  "venv/*",
                  "env/*",
                  "archive/*",
                  "dataset_ready/*",
                  "runs/*",
                  "vit-food101-checkpoints/*",
                  "my_ultimate_food_vit/*",
                  "food_dataset/*",
                  "test_main.py",
                  "jmeter/*",
                  "postman/*",
                  "*.csv",
              ]
          )
          print("Successfully deployed to Hugging Face Space!")
          print(f"Visit: https://huggingface.co/spaces/{repo_id}")
          EOF