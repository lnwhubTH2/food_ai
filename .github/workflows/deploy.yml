name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # ดึงไฟล์โมเดลมาด้วยเผื่อใช้ Test

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx # ติดตั้งไลบรารีสำหรับเทสต์

      - name: Run Pytest
        run: |
          pytest test_main.py -v # สั่งรันเทสต์

      - name: Push to Hugging Face Space
        if: success() # 🔥 หัวใจสำคัญ: ทำขั้นตอนนี้ก็ต่อเมื่อ pytest ด้านบนรันผ่าน 100% เท่านั้น
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://joyjoysad:${HF_TOKEN}@huggingface.co/spaces/joyjoysad/food_ai
          git push hf main --force